# pdfscan global configuration. Per-site config lives in the database (site.config_json).
# Precedence: CLI flag > env (PDFSCAN_*) > this file > built-in defaults.

database:
  path: ./data/pdfscan.db
  wal: true
  busy_timeout_ms: 30000

paths:
  # output_root relocates ALL outputs (database, exports/reports, saved PDF
  # copies, scratch) outside the project at once: set it to an absolute folder
  # and the relative paths below resolve under it. Leave null to keep outputs in
  # the project. Override per-run with --output-root or PDFSCAN_OUTPUT_ROOT.
  # e.g. output_root: D:/pdfscan-output   (or /mnt/data/pdfscan on Linux/Mac)
  output_root: null
  temp_dir: ./.scratch          # downloads-in-progress, resume progress files
  export_dir: ./exports         # csv/json/excel/html reports (PDFSCAN_EXPORT_DIR)
  verapdf_dir: ./vendor/verapdf  # bundled veraPDF (an input; stays in the project)

# Saved-PDF copies + database are outputs too and honor output_root:
#   storage.root  (below)  -> PDFSCAN_STORAGE_ROOT
#   database.path (above)  -> PDFSCAN_DB_PATH
# Each accepts an absolute path to live anywhere, independent of output_root.

# Scan sessions: instead of juggling output_root by hand, register named,
# isolated workspaces and switch between them (each has its own database):
#   pdfscan session add audit --root D:/pdfscan-data/audit --use --init
#   pdfscan crawl/verify/export ...   # write only under the active session
#   pdfscan session list | current | use <name> | path | show <name>
# Select per run with --session <name> / --session-root <path>, or the env vars
# PDFSCAN_SESSION / PDFSCAN_SESSION_ROOT. A session only supplies output_root when
# none is set explicitly (--output-root / PDFSCAN_OUTPUT_ROOT always win). The
# registry lives outside the repo (%APPDATA%\pdfscan\sessions.yaml on Windows,
# ${XDG_CONFIG_HOME:-~/.config}/pdfscan/sessions.yaml elsewhere; override with
# PDFSCAN_SESSIONS_FILE).

# Default crawl behavior (overridable per-site and per-run)
crawl:
  default_scope: host           # host | subdomain | domain | path
  include_external_pdfs: false  # capture PDFs hosted off the site's host
  max_depth: 0                  # 0 = unlimited

scrapy:
  user_agent: "pdfscan/0.1 (+https://github.com/sfbrn/pdfscan)"
  obey_robots: false            # default OFF; crawl politely instead
  download_delay: 0.5
  concurrent_requests: 16
  concurrent_requests_per_domain: 4
  autothrottle:
    enabled: true
    start_delay: 5
    max_delay: 60
    target_concurrency: 1.0
  playwright:
    enabled_default: false      # per-site render_js toggles this per request
    browser: chromium
    headless: true
    wait_until: networkidle
    timeout_ms: 30000

verapdf:
  # Downloaded + headlessly installed by `pdfscan setup-verapdf` if not already present.
  # The installer zip currently published at installer_url bundles veraPDF 1.30.2.
  version: "1.30.2"
  installer_url: "https://software.verapdf.org/releases/verapdf-installer.zip"
  flavour: ua1
  timeout: 300
  # command: ""  # explicit veraPDF path override (else auto-detected under verapdf_dir)

download:
  timeout: 30
  ssl_insecure_retry: true      # retry with verify=False on SSLError
  max_bytes: 524288000          # 500 MB cap; larger PDFs are logged as failures

verify:
  download_workers: 8           # parallel downloads per chunk (I/O-bound)
  batch_size: 50                # PDFs per chunk; also veraPDF files per JVM invocation
  batch_timeout: 1800           # seconds for one batched veraPDF run (falls back per-file)

classification:
  # Three-signal remediation classifier policy (good_to_go / auto-tag / manual).
  # Applied at READ time -- editing the profile re-labels PDFs with no re-verify.
  profile: ./config/classification.yaml

storage:
  root: ./remediation
  # Content-addressed by default: identical bytes are stored once (dedup on
  # {hash}), and a file replaced at the same URL becomes a new hash -> new file
  # (never clobbers the prior copy). Tokens: {root} {site} {path} {filename}
  # {hash} {date}. A URL-path template like {root}/{site}/{path}/{filename} is
  # browsable but opts out of dedup (and can clobber on replacement).
  template: "{root}/{site}/{hash}.pdf"

resolvers:
  enabled:
    - box

archive:
  keywords: [archive, archived, legacy, deprecated, obsolete, historical, outdated, past-events]
  path_segments: ["/old/", "/archive/", "/archived/", "/legacy/", "/backup/", "/previous/"]
  filename_prefixes: [archived_, old_, legacy_, deprecated_]
  filename_suffixes: [_archived, _old, _legacy, _deprecated]

logging:
  level: INFO
