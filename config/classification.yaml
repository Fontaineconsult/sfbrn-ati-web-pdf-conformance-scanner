# Three-signal remediation classifier policy.
#
# Emits one of: good_to_go / fit_for_automated_tagging / needs_manual_remediation.
# This is a tunable heuristic, not an industry-standard formula -- edit it freely.
# Classification happens at READ time: changing this file re-labels every PDF on
# the next `status` / `export` / `eval` with NO re-verification (the one
# exception is the `complex_graphic` signal, which is captured during verify).
#
# Use `pdfscan eval ./eval-set` against pre-sorted PDFs to calibrate these knobs.

clause_class:                 # veraPDF clause (ISO 14289 section) -> class.
  # Matched by longest prefix, so "7.18" also covers "7.18.1", "7.18.6.2", etc.
  # A failing clause with NO mapping here is "neutral" (penalised by the score
  # below as an unknown), so list only clauses you have a confident verdict on.
  "7.1": auto                 # tagging / structure tree
  "7.2": auto                 # general content tagging (paragraphs, lists)
  "7.3": manual               # tables: complex headers / spans need a human
  "7.4": manual               # heading hierarchy correctness
  "7.18": manual              # annotations / interactive content

structural:                   # hard routes -- these BEAT clause routing + score.
  image_only: manual          # scanned -> OCR + manual review
  has_form: manual            # forms need manual field labels / tooltips
  complex_graphic: manual     # overlapping image+text -> complex figure (heuristic)

score:                        # used ONLY for the fuzzy middle band (auto vs manual).
  start: 100                  # every doc starts here, penalties subtract
  per_violation: 4            # each counted veraPDF violation
  per_neutral_clause: 8       # each distinct failing clause with no class mapping
  per_page_over: 0            # penalty per page beyond big_doc_pages (default off)
  big_doc_pages: 100
  auto_threshold: 50          # score >= -> fit_for_automated_tagging, else manual
  borderline_band: 12         # |score - auto_threshold| <= band -> borderline confidence

good_to_go:                   # tagged AND 0 counted violations is always required;
  require_title: false        #   these add optional metadata strictness on top.
  require_language: false
